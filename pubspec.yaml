name: swaply
description: "Swaply — Buy, Sell, Exchange, Donate. Your marketplace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State management
  provider: ^6.1.2

  # Backend
  supabase_flutter: ^2.5.6
  image_picker: ^1.2.2

  # Charts (Admin Analytics)
  fl_chart: ^0.69.0

  # Notifications
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
